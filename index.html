<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Grading System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: #000;
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .content {
            padding: 30px;
        }

        .section-tabs {
            display: flex;
            margin-bottom: 30px;
            background: #eee;
            border-radius: 10px;
            padding: 10px;
        }

        .tab-btn {
            flex: 1;
            padding: 15px;
            border: none;
            background: transparent;
            font-size: 16px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
            color: #666;
        }

        .tab-btn.active {
            background: #000;
            color: white;
        }

        .tab-btn:hover {
            background: #ddd;
            color: #000;
        }

        .form-section, .records-section {
            display: none;
        }

        .form-section.active, .records-section.active {
            display: block;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #000;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
            background: white;
            color: #333;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #000;
        }

        input::placeholder {
            color: #999;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s ease;
            margin-right: 10px;
            margin-bottom: 10px;
        }

        .btn-primary { 
            background: #333; 
            color: white; 
        }

        .btn-primary:hover { 
            background: #000; 
            transform: translateY(-2px); 
        }

        .btn-success { 
            background: #666; 
            color: white; 
        }

        .btn-success:hover { 
            background: #555; 
            transform: translateY(-2px); 
        }

        .btn-danger { 
            background: #999; 
            color: white; 
        }

        .btn-danger:hover { 
            background: #888; 
            transform: translateY(-2px); 
        }

        .btn-warning { 
            background: #ccc; 
            color: #333; 
        }

        .btn-warning:hover { 
            background: #bbb; 
            transform: translateY(-2px); 
        }

        .subjects-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .subject-card {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 10px;
            border-left: 5px solid #000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            transition: transform 0.3s ease;
            border: 1px solid #eee;
        }

        .subject-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .subject-name {
            font-size: 1.3em;
            font-weight: bold;
            color: #000;
            margin-bottom: 10px;
        }

        .grade-display {
            font-size: 2em;
            font-weight: bold;
            color: #000;
            margin-bottom: 10px;
        }

        .remarks {
            color: #666;
            font-style: italic;
        }

        .stats {
            background: #333;
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 30px;
        }

        .stats h3 {
            margin-bottom: 10px;
        }

        .average-grade {
            font-size: 2.5em;
            font-weight: bold;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background: #000;
            color: white;
            font-weight: bold;
        }

        tr:hover {
            background: #f5f5f5;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #999;
            font-style: italic;
        }

        h2 {
            color: #000;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .section-tabs {
                flex-direction: column;
            }
            
            .subjects-container {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏫 IT Grading System</h1>
            <p>Manage subjects, grades, and records easily</p>
        </div>

        <div class="content">
            <div class="section-tabs">
                <button class="tab-btn active" onclick="showSection('add-grades')">Add Grades</button>
                <button class="tab-btn" onclick="showSection('view-records')">View Records</button>
            </div>

            <!-- Add Grades Section -->
            <div id="add-grades" class="form-section active">
                <div class="stats">
                    <h3>Current Average</h3>
                    <div id="averageGrade" class="average-grade">--</div>
                </div>

                <div class="input-group">
                    <label>Subject:</label>
                    <input type="text" id="subjectInput" placeholder="Enter subject name">
                </div>

                <div class="input-group">
                    <label>Grade (0-100):</label>
                    <input type="number" id="gradeInput" min="0" max="100" placeholder="Enter grade">
                </div>

                <div class="input-group">
                    <label>Remarks:</label>
                    <input type="text" id="remarksInput" placeholder="Enter remarks (optional)">
                </div>

                <button class="btn btn-primary" onclick="addSubject()">Add Subject</button>
                <button class="btn btn-success" onclick="saveRecord()">Save Record</button>
            </div>

            <!-- View Records Section -->
            <div id="view-records" class="records-section">
                <h2>Saved Records</h2>
                <div id="recordsTableContainer">
                    <div class="no-data">No records saved yet. Add grades and save a record!</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentGrades = JSON.parse(localStorage.getItem('currentGrades')) || [];
        let savedRecords = JSON.parse(localStorage.getItem('savedRecords')) || [];

        // Initialize
        updateAverage();
        renderSubjects();
        renderRecords();

        function showSection(sectionName) {
            // Hide all sections
            document.querySelectorAll('.form-section, .records-section').forEach(section => {
                section.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            // Show selected section
            document.getElementById(sectionName).classList.add('active');
            event.target.classList.add('active');
        }

        function addSubject() {
            const subject = document.getElementById('subjectInput').value.trim();
            const grade = parseFloat(document.getElementById('gradeInput').value);
            const remarks = document.getElementById('remarksInput').value.trim();

            if (!subject || isNaN(grade) || grade < 0 || grade > 100) {
                alert('Please enter valid subject and grade (0-100)');
                return;
            }

            currentGrades.push({ subject, grade, remarks });
            localStorage.setItem('currentGrades', JSON.stringify(currentGrades));

            // Clear form
            document.getElementById('subjectInput').value = '';
            document.getElementById('gradeInput').value = '';
            document.getElementById('remarksInput').value = '';

            renderSubjects();
            updateAverage();
        }

        function deleteSubject(index) {
            currentGrades.splice(index, 1);
            localStorage.setItem('currentGrades', JSON.stringify(currentGrades));
            renderSubjects();
            updateAverage();
        }

        function editSubject(index) {
            const subject = prompt('Edit subject:', currentGrades[index].subject);
            const grade = prompt('Edit grade:', currentGrades[index].grade);
            const remarks = prompt('Edit remarks:', currentGrades[index].remarks);

            if (subject && !isNaN(parseFloat(grade)) && parseFloat(grade) >= 0 && parseFloat(grade) <= 100) {
                currentGrades[index] = {
                    subject: subject.trim(),
                    grade: parseFloat(grade),
                    remarks: remarks ? remarks.trim() : ''
                };
                localStorage.setItem('currentGrades', JSON.stringify(currentGrades));
                renderSubjects();
                updateAverage();
            }
        }

        function renderSubjects() {
            // Remove existing container
            const existingContainer = document.querySelector('.subjects-container');
            if (existingContainer) {
                existingContainer.remove();
            }

            const container = document.createElement('div');
            container.className = 'subjects-container';

            if (currentGrades.length === 0) {
                container.innerHTML = '<div class="no-data" style="grid-column: 1/-1;">No subjects added yet. Add your first subject!</div>';
            } else {
                currentGrades.forEach((item, index) => {
                    const card = document.createElement('div');
                    card.className = 'subject-card';
                    card.innerHTML = `
                        <div class="subject-name">${item.subject}</div>
                        <div class="grade-display">${item.grade}</div>
                        <div class="remarks">${item.remarks || 'No remarks'}</div>
                        <br>
                        <button class="btn btn-warning" onclick="editSubject(${index})" style="margin-right: 10px;">Edit</button>
                        <button class="btn btn-danger" onclick="deleteSubject(${index})">Delete</button>
                    `;
                    container.appendChild(card);
                });
            }

            document.getElementById('add-grades').insertBefore(container, document.querySelector('.stats').nextSibling);
        }

        function updateAverage() {
            if (currentGrades.length === 0) {
                document.getElementById('averageGrade').textContent = '--';
                return;
            }

            const total = currentGrades.reduce((sum, item) => sum + item.grade, 0);
            const average = (total / currentGrades.length).toFixed(2);
            document.getElementById('averageGrade').textContent = average;
        }

        function saveRecord() {
            if (currentGrades.length === 0) {
                alert('Please add at least one subject before saving a record.');
                return;
            }

            const recordName = prompt('Enter record name (e.g., "Midterm 2024"):', 'New Record');
            if (recordName) {
                const record = {
                    name: recordName,
                    date: new Date().toLocaleDateString(),
                    grades: [...currentGrades],
                    average: document.getElementById('averageGrade').textContent
                };

                savedRecords.unshift(record);
                localStorage.setItem('savedRecords', JSON.stringify(savedRecords));

                // Clear current grades
                currentGrades = [];
                localStorage.setItem('currentGrades', JSON.stringify(currentGrades));

                renderRecords();
                renderSubjects();
                updateAverage();

                alert('Record saved successfully!');
            }
        }

        function deleteRecord(index) {
            if (confirm('Are you sure you want to delete this record?')) {
                savedRecords.splice(index, 1);
                localStorage.setItem('savedRecords', JSON.stringify(savedRecords));
                renderRecords();
            }
        }

        function renderRecords() {
            const container = document.getElementById('recordsTableContainer');
            
            if (savedRecords.length === 0) {
                container.innerHTML = '<div class="no-data">No records saved yet. Add grades and save a record!</div>';
                return;
            }

            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>Record Name</th>
                            <th>Date</th>
                            <th>Average</th>
                            <th>Total Subjects</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            savedRecords.forEach((record, index) => {
                html += `
                    <tr>
                        <td><strong>${record.name}</strong></td>
                        <td>${record.date}</td>
                        <td><strong>${record.average}</strong></td>
                        <td>${record.grades.length}</td>
                        <td>
                            <button class="btn btn-danger" onclick="deleteRecord(${index})">Delete</button>
                        </td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        }

        // Allow Enter key to add subject
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addSubject();
            }
        });
    </script>
</body>
</html>
